{% extends "base.html" %}

{% block content %}
<div style="max-width: 450px; margin: 4rem auto;" class="animate-in">
    <div class="glass-card">
        <h2 style="margin-bottom: 2rem; text-align: center;">Create Profile</h2>
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Pick a username">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="name@domain.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Secure password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>
        <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
            Already registered? <a href="{{ url_for('login') }}"
                style="color: var(--primary); text-decoration: none;">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
