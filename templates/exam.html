{% extends "base.html" %}
{% block content %}
<div style="max-width: 800px; margin: 1.5rem auto;" class="animate-in">
    <div class="exam-header">
        <div>
            <h2 style="color: var(--primary);">Question {{ index }} of {{ total }}</h2>
            <span class="badge badge-{{ difficulty }}">{{ difficulty }}</span>
        </div>
        <div class="timer" id="exam-timer">01:00</div>
    </div>
    <div
        style="height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; margin-bottom: 2rem; overflow: hidden;">
        <div
            style="width: {{ (index / total * 100)|int }}%; height: 100%; background: var(--primary); transition: width 0.5s;">
        </div>
    </div>
    <div class="glass-card">
        <div style="display: flex; justify-content: space-between;">
            <h3 style="font-size: 1.25rem; line-height: 1.4; margin-bottom: 1.5rem;">{{ question.text }}</h3>
            <!-- AI Proctoring Indicator -->
            <div id="proctor-status" style="width: 60px; height: 60px; border-radius: 12px; border: 2px solid var(--accent); overflow: hidden; position: relative;">
                <video id="webcam" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
                <div style="position: absolute; bottom: 0; background: rgba(0,0,0,0.5); width: 100%; text-align: center; font-size: 0.5rem;">LIVE</div>
            </div>
        </div>
        <form id="exam-form" action="{{ url_for('next_question') }}" method="POST">
            <div class="options-grid">
                <label class="option-btn"><input type="radio" name="answer" value="A" required><span>{{
                        question.option_a }}</span></label>
                <label class="option-btn"><input type="radio" name="answer" value="B"><span>{{ question.option_b
                        }}</span></label>
                <label class="option-btn"><input type="radio" name="answer" value="C"><span>{{ question.option_c
                        }}</span></label>
                <label class="option-btn"><input type="radio" name="answer" value="D"><span>{{ question.option_d
                        }}</span></label>
            </div>
            <div style="display: flex; justify-content: flex-end; margin-top: 1.5rem;">
                <button type="submit" class="btn btn-primary">{% if index == total %}Complete Exam{% else %}Next
                    Question{% endif %}</button>
            </div>
        </form>
    </div>
    
    <!-- Proxy Canvas for Snapshots -->
    <canvas id="snap-canvas" style="display: none;"></canvas>

    <!-- Faculty Alerts Overlay -->
    <div id="faculty-alert" class="glass-card animate-in" style="display: none; position: fixed; top: 1rem; left: 50%; transform: translateX(-50%); z-index: 2000; border: 1px solid var(--danger); background: rgba(239, 68, 68, 0.2);">
        <p style="font-weight: 700; color: var(--danger);">🚨 FACULTY NOTIFICATION</p>
        <p id="alert-text"></p>
        <button onclick="this.parentElement.style.display='none'" class="btn btn-sm btn-outline" style="margin-top: 0.5rem;">Acknowledge</button>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>
    let timeLeft = parseInt(localStorage.getItem('exam_time_left')) || 60;
    startTimer(timeLeft, document.getElementById('exam-timer'), () => {
        alert('Time is up! Submitting automatically.');
        window.location.href = "{{ url_for('submit_exam') }}";
    });

    // --- AI Proctoring: Start Webcam ---
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('snap-canvas');
    const ctx = canvas.getContext('2d');

    navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
        video.srcObject = stream;
    });

    // Take Snapshot every 45s
    setInterval(() => {
        canvas.width = 300; canvas.height = 225;
        ctx.drawImage(video, 0, 0, 300, 225);
        const img = canvas.toDataURL('image/jpeg', 0.5);
        fetch('/upload-snapshot', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ image: img })
        });
    }, 45000);

    // --- Heartbeat: Check Faculty Messages ---
    setInterval(() => {
        fetch('/get-messages').then(r => r.json()).then(msgs => {
            if(msgs.length > 0) {
                const modal = document.getElementById('faculty-alert');
                document.getElementById('alert-text').textContent = msgs[0].text;
                modal.style.display = 'block';
            }
        });
    }, 5000);
</script>
{% endblock %}
