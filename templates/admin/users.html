{% extends "base.html" %}
{% block content %}
<div class="animate-in">
    <h1 style="font-size: 2rem; margin-bottom: 2rem;">👥 Registered Users</h1>
    <div class="glass-card">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Student ID</th>
                        <th>Role</th>
                        <th>Joined</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in users %}
                    <tr>
                        <td>{{ u.id }}</td>
                        <td><strong>{{ u.username }}</strong></td>
                        <td>{{ u.email }}</td>
                        <td>{{ u.student_id }}</td>
                        <td><span class="badge badge-role">{{ u.role }}</span></td>
                        <td>{{ u.created_at.strftime('%b %d, %Y') if u.created_at else 'N/A' }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
